<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="../img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../img/favicon-16x16.png">
    <title>Connexion | PatiCalcul</title>
</head>
<body class="bg-light">

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">🧁 PatiCalcul</h3>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="login-email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mot de passe</label>
                        <input type="password" class="form-control" id="login-password">
                    </div>
                    <div id="login-error" class="text-danger mb-3" style="display:none;"></div>
                    <button class="btn btn-primary w-100" onclick="login()">Se connecter</button>
                    <hr>
                    <p class="text-center text-secondary mb-0">Pas encore de compte ?</p>
                    <button class="btn btn-outline-secondary w-100 mt-2" onclick="toggleRegister()">Créer un compte</button>
                </div>
            </div>

            <!-- REGISTER (caché par défaut) -->
            <div class="card shadow-sm mt-3" id="register-card" style="display:none;">
                <div class="card-body p-4">
                    <h5 class="mb-3">Inscription</h5>
                    <div class="mb-3">
                        <label class="form-label">Prénom</label>
                        <input type="text" class="form-control" id="register-firstname">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nom</label>
                        <input type="text" class="form-control" id="register-lastname">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="register-email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mot de passe</label>
                        <input type="password" class="form-control" id="register-password">
                    </div>
                    <div id="register-error" class="text-danger mb-3" style="display:none;"></div>
                    <button class="btn btn-primary w-100" onclick="register()">S'inscrire</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/login.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
