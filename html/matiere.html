<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="../img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../img/favicon-16x16.png">
    <title>Matières premières | PatiCalcul</title>
</head>
<body class="bg-light">

<script src="../js/navbar.js"></script>
<script>loadNavbar('matiere');</script>

<!-- CONTENU -->
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Matières premières</h2>
        <button class="btn btn-primary" onclick="openCreateModal()">+ Nouvelle matière</button>
    </div>

    <div class="card shadow-sm">
        <table class="table table-hover table-sm align-middle mb-0">
            <thead class="table-light">
            <tr>
                <th>Nom</th>
                <th class="d-none d-md-table-cell">Description</th>
                <th class="text-end">Prix</th>
                <th class="text-end">Qté paquet</th>
                <th>Unité</th>
                <th class="text-center">Actions</th>
            </tr>
            </thead>
            <tbody id="stuff-list"></tbody>
        </table>
    </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="editModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modal-title">Nouvelle matière</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="mb-3">
                    <label class="form-label">Nom</label>
                    <input type="text" class="form-control" id="edit-name">
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <input type="text" class="form-control" id="edit-description">
                </div>
                <div class="mb-3">
                    <label class="form-label">Prix</label>
                    <input type="number" step="0.01" class="form-control" id="edit-cost">
                </div>
                <div class="mb-3">
                    <label class="form-label">Quantité paquet</label>
                    <input type="number" class="form-control" id="edit-packageQuantity">
                </div>
                <div class="mb-3">
                    <label class="form-label">Unité</label>
                    <select class="form-select" id="edit-unit">
                        <option value="gram">Gramme</option>
                        <option value="liter">Litre</option>
                        <option value="piece">Pièce</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                <button class="btn btn-primary" onclick="submitForm()">Enregistrer</button>
            </div>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/matiere.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
